<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — iziGSM</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="public-bg">
  <div style="min-height:100vh;display:flex;flex-direction:column;">
    <header class="topbar simple">
      <a class="brand" href="/"><span class="brand-mark">i</span><span>iziGSM</span></a>
      <a class="btn btn-ghost btn-sm" href="/register">Créer un compte</a>
    </header>

    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="background:rgba(255,255,255,0.96);border-radius:24px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.96);width:100%;max-width:440px;overflow:hidden;">
        <!-- Barre violet -->
        <div style="height:4px;background:linear-gradient(90deg,#b39dff,var(--primary));"></div>

        <div style="padding:36px;">
          <div style="margin-bottom:28px;">
            <p class="eyebrow" style="margin:0 0 8px;">CONNEXION</p>
            <h2 style="margin:0 0 8px;font-size:1.8rem;letter-spacing:-0.05em;">Bon retour 👋</h2>
            <p style="margin:0;color:#667085;font-size:0.95rem;">Connectez-vous à votre espace iziGSM.</p>
          </div>

          <div class="flash-stack" id="flash-area" style="display:none;padding:0;margin-bottom:16px;"></div>

          <form id="login-form" novalidate>
            <div class="field" style="margin-bottom:16px;">
              <label for="login-email">Email professionnel *</label>
              <input type="email" id="login-email" name="email" placeholder="votre@email.fr" required autocomplete="email">
            </div>
            <div class="field" style="margin-bottom:8px;">
              <label for="login-password">Mot de passe *</label>
              <input type="password" id="login-password" name="password" required autocomplete="current-password">
            </div>
            <div style="text-align:right;margin-bottom:22px;">
              <a href="/reset-password" style="color:var(--primary);font-size:0.88rem;font-weight:600;">Mot de passe oublié ?</a>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="min-height:52px;font-size:1rem;">
              Se connecter
            </button>
          </form>

          <div class="separator" style="margin:20px 0;">OU</div>

          <!-- Google One Tap — chargé dynamiquement si GOOGLE_CLIENT_ID disponible -->
          <div id="google-btn-container" style="display:flex;justify-content:center;margin-bottom:8px;min-height:44px;">
            <!-- Le bouton Google est injecté ici par initGoogleOneTap() -->
            <div id="google-btn-fallback" class="oauth-box" style="cursor:not-allowed;opacity:.6;">
              <span class="oauth-logo">G</span>
              Google (non configuré)
            </div>
          </div>

          <p style="text-align:center;margin:20px 0 0;color:#667085;font-size:0.9rem;">
            Pas encore de compte ? <a href="/register" style="color:var(--primary);font-weight:700;">Inscription gratuite →</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * Soumission du formulaire de connexion.
     * Appelle POST /api/auth/login et stocke le token JWT dans localStorage.
     */
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const flash    = document.getElementById('flash-area');
      const btn      = this.querySelector('button[type="submit"]');

      // Feedback visuel
      btn.disabled    = true;
      btn.textContent = 'Connexion…';
      flash.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (data.success && data.accessToken) {
          // Stocker token + session au format attendu par app.js
          const user = data.user;

          // ─── Auto-sélection boutique pour l'admin ────────────────────────────
          // L'admin n'est rattaché à aucune boutique (boutique_id: null en base).
          // On récupère la première boutique disponible pour pré-renseigner la
          // session et permettre aux KPIs dashboard de charger correctement.
          let boutiqueId   = user.boutique_id   ?? null;
          let boutiqueName = user.boutique_name ?? null;

          if (!boutiqueId) {
            try {
              const bRes  = await fetch('/api/boutiques', {
                headers: { Authorization: `Bearer ${data.accessToken}` },
              });
              const bData = await bRes.json();
              if (bData.success && Array.isArray(bData.data) && bData.data.length > 0) {
                boutiqueId   = bData.data[0].id;
                boutiqueName = bData.data[0].nom;
              }
            } catch (_) {
              // non bloquant — le dashboard gèrera l'absence de boutique
            }
          }

          const session = {
            name:         `${user.prenom || ''} ${user.nom || ''}`.trim() || user.email,
            email:        user.email,
            role:         user.role,
            boutique_id:  boutiqueId,
            boutique_name: boutiqueName || 'Mon Atelier',
            company:      boutiqueName  || 'Mon Atelier',
          };
          localStorage.setItem('izigsm_token',         data.accessToken);
          localStorage.setItem('izigsm_refresh_token', data.refreshToken);
          localStorage.setItem('izigsm_session',       JSON.stringify(session));
          window.location.href = '/dashboard';
        } else {
          throw new Error(data.error || 'Email ou mot de passe incorrect.');
        }
      } catch (err) {
        flash.style.display = 'block';
        flash.innerHTML = `<div class="flash error">❌ ${err.message}</div>`;
        btn.disabled    = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
  <!-- Google Identity Services (One Tap) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    /**
     * Initialise Google One Tap si GOOGLE_CLIENT_ID est exposé via /api/auth/config.
     * Fallback gracieux : si non configuré, le bouton fallback reste visible.
     */
    async function initGoogleOneTap() {
      try {
        const res  = await fetch('/api/auth/config');
        if (!res.ok) return;
        const cfg = await res.json();
        if (!cfg.googleClientId) return;

        // Remplacer le bouton fallback
        document.getElementById('google-btn-fallback').style.display = 'none';

        // Attendre que la lib Google soit chargée
        await new Promise(resolve => {
          if (window.google?.accounts) { resolve(); return; }
          const check = setInterval(() => {
            if (window.google?.accounts) { clearInterval(check); resolve(); }
          }, 100);
          setTimeout(() => { clearInterval(check); resolve(); }, 3000);
        });

        if (!window.google?.accounts) return;

        // Initialiser Google Identity Services
        google.accounts.id.initialize({
          client_id:         cfg.googleClientId,
          callback:          handleGoogleCredential,
          auto_select:       false,
          cancel_on_tap_outside: true,
        });

        // Rendre le bouton Google dans le container
        google.accounts.id.renderButton(
          document.getElementById('google-btn-container'),
          {
            theme:     'outline',
            size:      'large',
            text:      'continue_with',
            shape:     'rectangular',
            logo_alignment: 'left',
            width:     368,
          }
        );
      } catch (_) { /* non bloquant */ }
    }

    async function handleGoogleCredential(response) {
      const flash = document.getElementById('flash-area');
      flash.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/google', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ credential: response.credential }),
        });
        const data = await res.json();

        if (data.success && data.accessToken) {
          const user = data.user;
          let boutiqueId   = user.boutique_id   ?? null;
          let boutiqueName = null;

          if (!boutiqueId) {
            try {
              const bRes  = await fetch('/api/boutiques', { headers: { Authorization: `Bearer ${data.accessToken}` } });
              const bData = await bRes.json();
              if (bData.success && bData.data?.length > 0) {
                boutiqueId   = bData.data[0].id;
                boutiqueName = bData.data[0].nom;
              }
            } catch (_) {}
          }

          localStorage.setItem('izigsm_token',         data.accessToken);
          localStorage.setItem('izigsm_refresh_token', data.refreshToken);
          localStorage.setItem('izigsm_session', JSON.stringify({
            name:          `${user.prenom || ''} ${user.nom || ''}`.trim() || user.email,
            email:         user.email,
            role:          user.role,
            boutique_id:   boutiqueId,
            boutique_name: boutiqueName || 'Mon Atelier',
            company:       boutiqueName || 'Mon Atelier',
          }));
          window.location.href = '/dashboard';
        } else {
          flash.style.display = 'block';
          flash.innerHTML = `<div class="flash error">❌ ${data.error || 'Erreur Google OAuth.'}</div>`;
        }
      } catch (err) {
        flash.style.display = 'block';
        flash.innerHTML = `<div class="flash error">❌ Erreur réseau : ${err.message}</div>`;
      }
    }

    // Lancer l'init après chargement
    window.addEventListener('DOMContentLoaded', initGoogleOneTap);
  </script>
  <script src="/static/js/pwa.js"></script>
</body>
</html>
